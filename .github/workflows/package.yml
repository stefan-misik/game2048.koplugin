name: Package KOReader plugin

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure zip is available
        run: |
          set -euo pipefail
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

      - name: Run packaging script
        run: |
          set -euo pipefail
          chmod +x ./package.sh
          ./package.sh

      - name: Verify ZIP was produced
        run: |
          set -euo pipefail
          ZIP_FILE="game2048.koplugin.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Expected artifact '$ZIP_FILE' not found."
            echo "Files in workspace:"
            ls -la
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: game2048.koplugin-zip
          path: game2048.koplugin.zip
          if-no-files-found: error
